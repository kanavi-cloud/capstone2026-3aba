name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Maven 빌드
        run: |
          cd backend
          ./mvnw clean package -DskipTests

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js 18 설정
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: 의존성 설치 & 빌드
        # 경로를 원래 폴더 위치인 frontend/frontend로 설정
        working-directory: frontend/frontend
        run: |
          npm install
          npm run build