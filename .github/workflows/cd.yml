name: CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 수동 실행 버튼 추가

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Backend 빌드 & 푸시
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest

      - name: Frontend 빌드 & 푸시
        run: |
          # 현재 구조인 frontend/frontend 경로 반영
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latest ./frontend/frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latest